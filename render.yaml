services:
  - type: web
    name: langgraph-sante-superviseur
    runtime: docker
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: DB_PATH
        value: data/observability.db
      - key: MOCK_LLM
        value: false
